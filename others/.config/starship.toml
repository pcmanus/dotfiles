format = """
$directory\
$git_branch\
$git_status\
$fill\
$python\
$lua\
$nodejs\
$golang\
$haskell\
$rust\
$ruby\
$aws\
$docker_context\
$jobs\
$cmd_duration\
${custom.wprofile}\
$line_break\
$character"""

add_newline = true
palette = "nord"

[directory]
truncate_to_repo = false
read_only = ' '
truncation_length = 10
truncation_symbol = '…/'
style = 'bold fg:dark_blue'
format = '[$path ]($style)'

[directory.substitutions]
'~/Documents' = '󰈙'
'~/Downloads' = ' '
'~/Music' = ' '
'~/Pictures' = ' '
"~/Git" = ""

[git_metrics]
disabled = false

[git_branch]
style = 'fg:green'
symbol = ' '
format = '[on](white) [$symbol$branch ]($style)'

[git_status]
style = 'fg:red'
format = '([$all_status$ahead_behind]($style) )'

[fill]
symbol = ' '

[rust]
style = 'orange'
symbol = ' '

[jobs]
symbol = ' '
style = 'red'
number_threshold = 1
format = '[$symbol]($style)'

[gcloud]
disabled = true

[custom.wprofile]
command = 'printf "[%s]" "$WPROFILE"'
when = '[[ -n "$WPROFILE" ]]'
shell = ["zsh", "--no-rcs"]
format = "[$output]($style) "
style = "bold yellow"

