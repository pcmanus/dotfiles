config-version = 2

start-at-login = true
automatically-unhide-macos-hidden-apps = true

[key-mapping]
preset = 'qwerty'

[mode.main.binding]
# --- Launch terminal (Ghostty) ---
cmd-e = '''
exec-and-forget /bin/bash -lc '
  set -u

  current_ws="$(aerospace list-workspaces --focused)"

  get_ghostty_ids() {
    aerospace list-windows --all --format "%{window-id}|%{app-name}" \
      | awk -F"|" '\''$2 == "Ghostty" { print $1 }'\'' \
      | sort -n
  }

  before="$(get_ghostty_ids)"

  osascript \
    -e '\''tell application "Ghostty"'\'' \
    -e '\''new window'\'' \
    -e '\''end tell'\'' >/dev/null 2>&1

  new_id=""
  i=0
  while [ "$i" -lt 40 ]; do
    after="$(get_ghostty_ids)"
    new_id="$(comm -13 <(printf "%s\n" "$before") <(printf "%s\n" "$after") | head -n1)"
    [ -n "$new_id" ] && break
    sleep 0.05
    i=$((i + 1))
  done

  if [ -n "$new_id" ]; then
    aerospace move-node-to-workspace --window-id "$new_id" --focus-follows-window "$current_ws"
  else
    aerospace workspace "$current_ws"
  fi
'
'''
# --- Move focus across windows (vim keys) ---
cmd-h = 'focus left'
cmd-j = 'focus down'
cmd-k = 'focus up'
cmd-l = 'focus right'

# --- Move windows (change their tiling position in the tree) ---
cmd-shift-h = 'move left'
cmd-shift-j = 'move down'
cmd-shift-k = 'move up'
cmd-shift-l = 'move right'

# --- Workspaces: switch ---
cmd-1 = 'workspace --auto-back-and-forth 1'
cmd-2 = 'workspace --auto-back-and-forth 2'
cmd-3 = 'workspace --auto-back-and-forth 3'
cmd-4 = 'workspace --auto-back-and-forth 4'
cmd-5 = 'workspace --auto-back-and-forth 5'
cmd-6 = 'workspace --auto-back-and-forth 6'
cmd-7 = 'workspace --auto-back-and-forth 7'
cmd-8 = 'workspace --auto-back-and-forth 8'
cmd-9 = 'workspace --auto-back-and-forth 9'

# --- Workspaces: send focused window to workspace ---
cmd-shift-1 = 'move-node-to-workspace 1'
cmd-shift-2 = 'move-node-to-workspace 2'
cmd-shift-3 = 'move-node-to-workspace 3'
cmd-shift-4 = 'move-node-to-workspace 4'
cmd-shift-5 = 'move-node-to-workspace 5'
cmd-shift-6 = 'move-node-to-workspace 6'
cmd-shift-7 = 'move-node-to-workspace 7'
cmd-shift-8 = 'move-node-to-workspace 8'
cmd-shift-9 = 'move-node-to-workspace 9'

# --- Convenience ---
alt-shift-r = 'reload-config'

[gaps]

inner.horizontal = 4
inner.vertical = 4
